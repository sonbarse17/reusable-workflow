name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.12'
      enable_code_scanning:
        required: false
        type: boolean
        default: true
      enable_docker_build:
        required: false
        type: boolean
        default: true
      docker_registry:
        required: false
        type: string
        default: 'docker.io'
      docker_image_name:
        required: false
        type: string
      enable_sonar_scan:
        required: false
        type: boolean
        default: true
      enable_owasp_scan:
        required: false
        type: boolean
        default: true
      enable_iac_scan:
        required: false
        type: boolean
        default: true
      enable_secret_scan:
        required: false
        type: boolean
        default: true
      enable_k8s_deploy:
        required: false
        type: boolean
        default: false
      k8s_manifest_dir:
        required: false
        type: string
        default: 'k8s/'
      k8s_namespace:
        required: false
        type: string
        default: 'default'
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      NVD_API_KEY:
        required: false
      KUBECONFIG:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        if: ${{ inputs.enable_secret_scan }}
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if ls test_*.py 1> /dev/null 2>&1 || [ -d tests ] || [ -f pytest.ini ]; then
            pip install pytest pytest-cov
            pytest --cov=. --cov-report=xml
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

      - name: Initialize CodeQL
        if: ${{ inputs.enable_code_scanning }}
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        if: ${{ inputs.enable_code_scanning }}
        uses: github/codeql-action/analyze@v3

      - name: SonarQube Scan
        if: ${{ inputs.enable_sonar_scan }}
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: OWASP Dependency Check
        if: ${{ inputs.enable_owasp_scan }}
        uses: dependency-check/Dependency-Check_Action@main
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: ${{ github.repository }}
          path: .
          format: HTML
          args: >
            --failOnCVSS 7
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP Dependency Check Report
        if: ${{ inputs.enable_owasp_scan }}
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports

      - name: Run Checkov Scan
        if: ${{ inputs.enable_iac_scan }}
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif

      - name: Upload Checkov Scan Results
        if: ${{ inputs.enable_iac_scan }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov-iac-scanning

      - name: Run tfsec Scan
        if: ${{ inputs.enable_iac_scan }}
        uses: aquasecurity/tfsec-action@master
        with:
          soft_fail: true
          format: sarif
          out: tfsec-results.sarif

      - name: Upload tfsec Scan Results
        if: ${{ inputs.enable_iac_scan }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec-iac-scanning

      - name: Set up QEMU
        if: ${{ inputs.enable_docker_build }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ inputs.enable_docker_build }}
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: ${{ inputs.enable_docker_build }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: ${{ inputs.enable_docker_build }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.docker_registry }}/${{ inputs.docker_image_name || github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and Push Image
        if: ${{ inputs.enable_docker_build }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scanner
        if: ${{ inputs.enable_docker_build }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.docker_registry }}/${{ inputs.docker_image_name || github.repository }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy Scan Results
        if: ${{ inputs.enable_docker_build }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: docker-image-scanning

  deploy-to-k8s:
    needs: devsecops-pipeline
    if: ${{ inputs.enable_k8s_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          # Create namespace if it doesn't exist just in case
          kubectl create namespace ${{ inputs.k8s_namespace }} --dry-run=client -o yaml | kubectl apply -f -
          
          # Apply manifests from the specified directory
          kubectl apply -f ${{ inputs.k8s_manifest_dir }} -n ${{ inputs.k8s_namespace }}
